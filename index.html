<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Academy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #58cc02; --green-dark: #46a302; --green-light: #d7f5b1;
    --blue: #1cb0f6; --blue-dark: #0494cc; --blue-light: #ddf4ff;
    --yellow: #ffc800; --yellow-dark: #e6a800; --yellow-light: #fff3cc;
    --red: #ff4b4b; --red-light: #ffe0e0;
    --purple: #ce82ff; --purple-dark: #a560e8; --purple-light: #f0d9ff;
    --gray: #afafaf; --gray-light: #f7f7f7; --gray-dark: #777;
    --text: #3c3c3c; --white: #ffffff;
    --border: #e5e5e5; --shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-light); color: var(--text); min-height: 100vh; }

  /* NAV */
  .nav { background: var(--white); border-bottom: 2px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-size: 22px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--text); }
  .nav-stats { display: flex; gap: 20px; align-items: center; }
  .stat-pill { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 15px; }
  .stat-pill .icon { font-size: 18px; }
  .stat-pill.streak { color: #ff9600; }
  .stat-pill.xp { color: var(--green); }

  /* LAYOUT */
  .app { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  .home-header { text-align: center; margin-bottom: 36px; }
  .home-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .home-header p { color: var(--gray-dark); font-size: 16px; }
  .xp-bar-wrap { background: var(--border); border-radius: 99px; height: 14px; margin: 12px 0 4px; overflow: hidden; }
  .xp-bar-fill { background: var(--green); height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .xp-label { font-size: 13px; color: var(--gray-dark); text-align: right; }

  /* MODULE GRID */
  .modules-grid { display: flex; flex-direction: column; gap: 20px; }
  .module-card { background: var(--white); border-radius: 20px; border: 2px solid var(--border); padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .module-card:hover:not(.locked) { transform: translateY(-2px); box-shadow: var(--shadow); }
  .module-card.locked { opacity: 0.55; cursor: not-allowed; }
  .module-card.completed { border-color: var(--green); }
  .module-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .module-icon { font-size: 36px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 16px; flex-shrink: 0; }
  .module-info h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .module-info p { font-size: 14px; color: var(--gray-dark); line-height: 1.4; }
  .module-progress-bar { background: var(--border); border-radius: 99px; height: 10px; margin-top: 12px; overflow: hidden; }
  .module-progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .module-progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray-dark); margin-top: 6px; }
  .lesson-dots { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .lesson-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: var(--white); }
  .lesson-dot.done { background: var(--green); border-color: var(--green); color: white; }
  .lesson-dot.current { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light); }
  .lesson-dot.locked-dot { background: var(--gray-light); color: var(--gray); cursor: not-allowed; }
  .lock-badge { position: absolute; top: 16px; right: 16px; font-size: 22px; }

  /* LESSON SCREEN */
  .lesson-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 0.2s; }
  .back-btn:hover { background: var(--border); }
  .lesson-progress-bar { flex: 1; background: var(--border); border-radius: 99px; height: 12px; overflow: hidden; }
  .lesson-progress-fill { background: var(--green); height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  .lesson-title { font-size: 14px; font-weight: 700; color: var(--gray-dark); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .lesson-content-card { background: var(--white); border-radius: 20px; border: 2px solid var(--border); padding: 28px; margin-bottom: 24px; }
  .lesson-content-card h2 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
  .lesson-content-card p { font-size: 16px; line-height: 1.7; color: #444; margin-bottom: 14px; }
  .lesson-content-card p:last-child { margin-bottom: 0; }
  .highlight-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 0 12px 12px 0; padding: 14px 18px; margin: 16px 0; font-size: 15px; line-height: 1.6; }
  .formula-box { background: var(--yellow-light); border: 2px solid var(--yellow); border-radius: 12px; padding: 14px 18px; margin: 16px 0; font-family: monospace; font-size: 15px; text-align: center; font-weight: 700; }
  .key-terms { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .key-term { background: var(--gray-light); border-radius: 12px; padding: 12px; }
  .key-term strong { display: block; font-size: 14px; color: var(--blue-dark); margin-bottom: 4px; }
  .key-term span { font-size: 13px; color: var(--gray-dark); line-height: 1.4; }

  .continue-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
  .continue-btn.green { background: var(--green); color: white; border-bottom: 4px solid var(--green-dark); }
  .continue-btn.green:hover { background: #4db800; }
  .continue-btn.green:active { transform: translateY(2px); border-bottom-width: 2px; }
  .continue-btn.blue { background: var(--blue); color: white; border-bottom: 4px solid var(--blue-dark); }
  .continue-btn.blue:hover { background: #0aa0de; }
  .continue-btn.blue:active { transform: translateY(2px); border-bottom-width: 2px; }

  /* QUIZ */
  .quiz-question { font-size: 22px; font-weight: 800; margin-bottom: 24px; line-height: 1.3; }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .quiz-option { background: var(--white); border: 2px solid var(--border); border-radius: 14px; padding: 16px 20px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: left; }
  .quiz-option:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); }
  .quiz-option.selected { border-color: var(--blue); background: var(--blue-light); }
  .quiz-option.correct { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .quiz-option.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .quiz-option:disabled { cursor: not-allowed; }

  .feedback-bar { border-radius: 16px; padding: 18px 24px; margin-bottom: 20px; display: none; align-items: center; gap: 14px; }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct-fb { background: var(--green-light); border: 2px solid var(--green); }
  .feedback-bar.wrong-fb { background: var(--red-light); border: 2px solid var(--red); }
  .feedback-icon { font-size: 28px; }
  .feedback-text strong { display: block; font-size: 16px; font-weight: 800; margin-bottom: 2px; }
  .feedback-text span { font-size: 14px; color: var(--gray-dark); }
  .feedback-bar.correct-fb .feedback-text strong { color: var(--green-dark); }
  .feedback-bar.wrong-fb .feedback-text strong { color: var(--red); }

  /* LESSON COMPLETE */
  .complete-screen { text-align: center; padding: 40px 20px; }
  .complete-screen .trophy { font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  .complete-screen h2 { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
  .complete-screen p { color: var(--gray-dark); font-size: 16px; margin-bottom: 28px; }
  .xp-earned { background: var(--yellow-light); border: 2px solid var(--yellow); border-radius: 16px; display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; font-size: 22px; font-weight: 800; color: var(--yellow-dark); margin-bottom: 28px; }
  .stats-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 32px; }
  .stat-box { background: var(--white); border: 2px solid var(--border); border-radius: 16px; padding: 18px 24px; text-align: center; }
  .stat-box .val { font-size: 28px; font-weight: 800; }
  .stat-box .lbl { font-size: 13px; color: var(--gray-dark); margin-top: 2px; }

  /* CONFETTI */
  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall linear forwards; border-radius: 2px; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: 24px; padding: 32px; max-width: 420px; width: 100%; text-align: center; }
  .modal h3 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
  .modal p { color: var(--gray-dark); font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .modal-btn { padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .modal-btn.primary { background: var(--green); color: white; border-bottom: 3px solid var(--green-dark); }
  .modal-btn.secondary { background: var(--gray-light); color: var(--text); border: 2px solid var(--border); }

  /* COLORS PER MODULE */
  .mod-0 .module-icon { background: #fff3cc; } .mod-0 .module-progress-fill { background: var(--yellow); } .mod-0.module-card:hover:not(.locked) { border-color: var(--yellow); }
  .mod-1 .module-icon { background: var(--blue-light); } .mod-1 .module-progress-fill { background: var(--blue); } .mod-1.module-card:hover:not(.locked) { border-color: var(--blue); }
  .mod-2 .module-icon { background: var(--purple-light); } .mod-2 .module-progress-fill { background: var(--purple); } .mod-2.module-card:hover:not(.locked) { border-color: var(--purple); }
  .mod-3 .module-icon { background: var(--green-light); } .mod-3 .module-progress-fill { background: var(--green); } .mod-3.module-card:hover:not(.locked) { border-color: var(--green); }

  @media(max-width:600px) { .key-terms{grid-template-columns:1fr} .stats-row{gap:12px} }

  /* NEW MODULE COLORS */
  .mod-4 .module-icon { background: #e0f7fa; } .mod-4 .module-progress-fill { background: #00bcd4; } .mod-4.module-card:hover:not(.locked) { border-color: #00bcd4; }
  .mod-5 .module-icon { background: #fbe9e7; } .mod-5 .module-progress-fill { background: #ff5722; } .mod-5.module-card:hover:not(.locked) { border-color: #ff5722; }
  .mod-6 .module-icon { background: #ede7f6; } .mod-6 .module-progress-fill { background: #673ab7; } .mod-6.module-card:hover:not(.locked) { border-color: #673ab7; }
  .mod-7 .module-icon { background: #fff8e1; } .mod-7 .module-progress-fill { background: #ffa000; } .mod-7.module-card:hover:not(.locked) { border-color: #ffa000; }
  .mod-8 .module-icon { background: #e8f5e9; } .mod-8 .module-progress-fill { background: #2e7d32; } .mod-8.module-card:hover:not(.locked) { border-color: #2e7d32; }
  .mod-9 .module-icon { background: #fce4ec; } .mod-9 .module-progress-fill { background: #c2185b; } .mod-9.module-card:hover:not(.locked) { border-color: #c2185b; }

  /* DAILY CHALLENGE CARD */
  .daily-card { background: linear-gradient(135deg, #ff9600, #ff6b00); color: white; border: none !important; padding: 24px; display: flex; align-items: center; gap: 20px; cursor: pointer; transition: all 0.2s; }
  .daily-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(255,150,0,0.4); }
  .daily-card.completed { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
  .daily-card-icon { font-size: 44px; flex-shrink: 0; }
  .daily-card-info h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; color: white; }
  .daily-card-info p { font-size: 14px; opacity: 0.95; color: white; }
  .daily-badge { background: rgba(255,255,255,0.25); border-radius: 99px; padding: 6px 14px; font-size: 13px; font-weight: 800; margin-left: auto; flex-shrink: 0; }

  /* NAV FORMULA BUTTON */
  .nav-formula-btn { background: var(--gray-light); border: 2px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--text); }
  .nav-formula-btn:hover { background: var(--border); }

  /* REVIEW CARD */
  .review-card { border-color: var(--blue) !important; background: var(--blue-light); display: flex; align-items: center; gap: 20px; padding: 20px 24px; }
  .review-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--blue-dark) !important; }
  .review-card-icon { font-size: 40px; flex-shrink: 0; }
  .review-card-info h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .review-card-info p { font-size: 14px; color: var(--gray-dark); }
  .review-badge { background: var(--blue); color: white; border-radius: 99px; padding: 4px 12px; font-size: 13px; font-weight: 700; margin-left: auto; flex-shrink: 0; }

  /* ACCURACY BADGE */
  .accuracy-badge { display: inline-block; border-radius: 99px; padding: 3px 10px; font-size: 12px; font-weight: 700; margin-left: 8px; }
  .accuracy-badge.good { background: var(--green-light); color: var(--green-dark); }
  .accuracy-badge.ok { background: var(--yellow-light); color: var(--yellow-dark); }
  .accuracy-badge.low { background: var(--red-light); color: var(--red); }

  /* FORMULA SCREEN */
  .formula-screen-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .formula-screen-header h1 { font-size: 26px; font-weight: 800; }
  .formula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .formula-category { background: white; border-radius: 20px; border: 2px solid var(--border); padding: 20px; }
  .formula-cat-header { font-size: 15px; font-weight: 800; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
  .formula-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .formula-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .formula-item-name { font-size: 12px; font-weight: 700; color: var(--blue-dark); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .formula-box-sm { background: var(--yellow-light); border: 1.5px solid var(--yellow); border-radius: 8px; padding: 7px 12px; font-family: monospace; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .formula-item-note { font-size: 12px; color: var(--gray-dark); line-height: 1.4; }
  @media(max-width:600px) { .formula-grid { grid-template-columns: 1fr; } }

  /* MODULE 10 COLOR */
  .mod-10 .module-icon { background: #e3f2fd; } .mod-10 .module-progress-fill { background: #1565c0; } .mod-10.module-card:hover { border-color: #1565c0; }

  /* GLOSSARY SCREEN */
  .glossary-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .glossary-header h1 { font-size: 26px; font-weight: 800; }
  .glossary-search-wrap { position: relative; margin-bottom: 24px; }
  .glossary-search { width: 100%; padding: 14px 20px 14px 48px; font-size: 16px; border: 2px solid var(--border); border-radius: 14px; outline: none; background: var(--white); transition: border 0.2s; }
  .glossary-search:focus { border-color: var(--blue); }
  .glossary-search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
  .glossary-count { font-size: 13px; color: var(--gray-dark); margin-bottom: 16px; font-weight: 600; }
  .glossary-category { margin-bottom: 28px; }
  .glossary-cat-title { font-size: 13px; font-weight: 800; color: var(--gray-dark); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .glossary-term { background: var(--white); border: 2px solid var(--border); border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
  .glossary-term:hover { border-color: var(--blue); transform: translateY(-1px); }
  .glossary-term-word { font-size: 15px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
  .glossary-term-def { font-size: 13px; color: var(--gray-dark); line-height: 1.45; }
  .glossary-term.highlight { border-color: var(--blue); background: var(--blue-light); }
  .glossary-empty { text-align: center; padding: 48px 20px; color: var(--gray-dark); }
  .glossary-empty p { font-size: 16px; margin-top: 8px; }
  @media(max-width:600px) { .glossary-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">Finance<span>Academy</span></div>
  <div class="nav-stats">
    <button class="nav-formula-btn" onclick="showScreen('glossary');renderGlossary()">📖 Glossary</button>
    <button class="nav-formula-btn" onclick="showScreen('formulas');renderFormulas()">📐 Formulas</button>
    <div class="stat-pill streak"><span class="icon">🔥</span><span id="nav-streak">0</span></div>
    <div class="stat-pill xp"><span class="icon">⭐</span><span id="nav-xp">0</span> XP</div>
  </div>
</nav>

<!-- CONFETTI -->
<div class="confetti-container" id="confetti-container"></div>


<!-- SCREENS -->
<div class="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <h1>Finance Academy 🎓</h1>
      <p>Master finance before Clemson. Learn → Practice → Level up.</p>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px">
          <span>Level <span id="home-level">1</span></span>
          <span id="home-xp-label">0 / 500 XP</span>
        </div>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="home-xp-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="modules-grid" id="modules-grid"></div>
  </div>

  <!-- LESSON SCREEN -->
  <div class="screen" id="screen-lesson">
    <div class="lesson-header">
      <button class="back-btn" onclick="confirmBack()">✕</button>
      <div class="lesson-progress-bar"><div class="lesson-progress-fill" id="lesson-progress-fill" style="width:0%"></div></div>
    </div>
    <div id="lesson-body"></div>
  </div>

  <!-- COMPLETE SCREEN -->
  <div class="screen" id="screen-complete">
    <div class="complete-screen" id="complete-body"></div>
  </div>

  <!-- DAILY CHALLENGE SCREEN -->
  <div class="screen" id="screen-daily">
    <div class="lesson-header">
      <button class="back-btn" onclick="showScreen('home');renderHome()">✕</button>
      <div class="lesson-progress-bar"><div class="lesson-progress-fill" id="daily-progress-fill" style="width:0%"></div></div>
      <div style="font-size:14px;font-weight:800;color:var(--gray-dark)" id="daily-q-counter">1 / 3</div>
    </div>
    <div id="daily-body"></div>
  </div>

  <!-- FORMULA SCREEN -->
  <div class="screen" id="screen-formulas">
    <div class="formula-screen-header">
      <button class="back-btn" onclick="showScreen('home');renderHome()">✕</button>
      <h1>📐 Formula Reference</h1>
    </div>
    <div class="formula-grid" id="formula-body"></div>
  </div>

  <!-- GLOSSARY SCREEN -->
  <div class="screen" id="screen-glossary">
    <div class="glossary-header">
      <button class="back-btn" onclick="showScreen('home');renderHome()">✕</button>
      <h1>📖 Finance Glossary</h1>
    </div>
    <div class="glossary-search-wrap">
      <span class="glossary-search-icon">🔍</span>
      <input class="glossary-search" id="glossary-search" type="text" placeholder="Search 100 finance terms…" oninput="filterGlossary(this.value)">
    </div>
    <div class="glossary-count" id="glossary-count"></div>
    <div id="glossary-body"></div>
  </div>

</div>

<script>
// ─── CURRICULUM ──────────────────────────────────────────────────────────────
const CURRICULUM = [
  {
    id: 0, title: "Personal Finance", icon: "💰",
    desc: "Budgeting, credit, saving, and taxes — the fundamentals of managing your own money.",
    lessons: [
      {
        title: "Budgeting & Cash Flow",
        content: `
          <h2>Budgeting & Cash Flow</h2>
          <p>A <strong>budget</strong> is a plan for your money. It tells every dollar where to go instead of wondering where it went. The most important concept in personal finance is <strong>cash flow</strong>: the difference between what comes in (income) and what goes out (expenses).</p>
          <div class="highlight-box">💡 <strong>Positive cash flow</strong> = Income > Expenses → you're building wealth. <strong>Negative cash flow</strong> = Expenses > Income → you're going into debt.</div>

          <h2>Time Value of Money</h2>
          <p>The <strong>Time Value of Money (TVM)</strong> is the single most important concept in all of finance. The core idea: a dollar today is worth more than a dollar in the future, because today's dollar can be invested to earn returns.</p>

          <h2>Cognitive Biases That Cost Investors Money</h2>

          <h2>Present Value & Future Value</h2>
          <p>A dollar today is worth more than a dollar tomorrow. This is the <strong>Time Value of Money (TVM)</strong> — arguably the single most important concept in all of finance. Every valuation, every investment decision, every loan calculation is built on this idea.</p>
          <div class="highlight-box">💡 Why is today's dollar worth more? Three reasons: (1) you can invest it and earn a return, (2) inflation erodes future purchasing power, (3) future cash is uncertain — there's risk you may never receive it.</div>
          <p><strong>Future Value (FV)</strong> answers: "What will my money be worth in N years if I invest it at rate r?"</p>
          <div class="formula-box">FV = PV × (1 + r)ⁿ</div>
          <p><strong>Present Value (PV)</strong> answers: "What is a future payment worth in today's dollars?" It's just the inverse — you're <em>discounting</em> future money back to today.</p>

          </div>
          <p><strong>Quick example:</strong> $1,000 invested at 8% for 10 years → FV = $1,000 × (1.08)¹⁰ = <strong>$2,158.92</strong>. Or in reverse: $2,158.92 received in 10 years, at an 8% discount rate, is worth exactly $1,000 today.</p>

        content: `
          <h2>Net Present Value (NPV)</h2>
          <p><strong>NPV</strong> is the gold standard for evaluating any investment, project, or business decision involving cash flows over time. It answers a deceptively simple question: <em>"Does this project create value or destroy it?"</em></p>
          <div class="formula-box">NPV = Σ [CFₜ / (1+r)ᵗ] − Initial Investment</div>
          <p>You discount every future cash flow back to today, sum them all up, and subtract what you have to pay upfront. If the result is positive, the project is worth more than it costs — it creates value.</p>
          <div class="highlight-box">✅ <strong>NPV > 0</strong> → Project creates value. <strong>ACCEPT.</strong><br>❌ <strong>NPV < 0</strong> → Project destroys value. <strong>REJECT.</strong><br>⚖️ <strong>NPV = 0</strong> → Indifferent. Project earns exactly your required return.</div>
          <p><strong>Example:</strong> A project costs $100,000 upfront and pays $30,000/year for 5 years. At a 10% discount rate:</p>

          <h2>Internal Rate of Return (IRR)</h2>
          <p><strong>IRR</strong> is the discount rate that makes the NPV of a project exactly zero. Conceptually, it's the project's "implied annualized return" — the rate at which the present value of inflows exactly equals the upfront cost.</p>

          <p>You can't solve for IRR algebraically — it requires iteration (or Excel's IRR function). The key insight is the <strong>decision rule</strong>:</p>

// ─── STATE ───────────────────────────────────────────────────────────────────
const DEFAULT_STATE = {
  xp: 0, streak: 0, lastDate: null,
  completed: {}, // { "modId-lessonIdx": { score, total, xpEarned } }
  missed: {},    // { "modId-lessonIdx": [qIdx, ...] }
  dailyChallengeDate: null,
};

let state = JSON.parse(localStorage.getItem('fa_state') || 'null') || { ...DEFAULT_STATE };
if (!state.missed) state.missed = {};
if (!state.dailyChallengeDate) state.dailyChallengeDate = null;
let session = { modId: null, lessonIdx: null, step: 0, score: 0, wrong: 0 };

function save() { localStorage.setItem('fa_state', JSON.stringify(state)); }

function lessonKey(mId, lIdx) { return `${mId}-${lIdx}`; }
function isDone(mId, lIdx) { return !!state.completed[lessonKey(mId, lIdx)]; }
function isModUnlocked(mId) { return true; }
function allLessonsDone(mId) {
  return CURRICULUM[mId].lessons.every((_, i) => isDone(mId, i));
}
function nextLesson(mId) {
  return CURRICULUM[mId].lessons.findIndex((_, i) => !isDone(mId, i));
}

// ─── STREAK ──────────────────────────────────────────────────────────────────
function checkStreak() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastDate === yesterday) { state.streak++; }
  else if (state.lastDate !== today) { state.streak = 1; }
  state.lastDate = today;
  save();
}
checkStreak();

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateNav() {
  document.getElementById('nav-streak').textContent = state.streak;
  document.getElementById('nav-xp').textContent = state.xp;
}

function updateHomeXP() {
  const level = Math.floor(state.xp / 500) + 1;
  const levelXP = state.xp % 500;
  document.getElementById('home-level').textContent = level;
  document.getElementById('home-xp-label').textContent = `${levelXP} / 500 XP`;
  document.getElementById('home-xp-bar').style.width = (levelXP / 500 * 100) + '%';
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }

// ─── HOME ────────────────────────────────────────────────────────────────────
function getMissedCount() {
  return Object.values(state.missed).reduce((a, b) => a + b.length, 0);
}

function moduleAccuracy(mId) {
  const mod = CURRICULUM[mId];
  let totalScore = 0, totalQ = 0;
  mod.lessons.forEach((l, i) => {
    const c = state.completed[lessonKey(mId, i)];
    if (c) { totalScore += c.score; totalQ += c.total; }
  });
  return totalQ > 0 ? Math.round(totalScore / totalQ * 100) : null;
}

function renderHome() {
  updateHomeXP(); updateNav();
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  // Daily Challenge card
  const today = new Date().toDateString();
  const challengeDone = state.dailyChallengeDate === today;
  const dc = document.createElement('div');
  dc.className = `module-card daily-card${challengeDone ? ' completed' : ''}`;
  dc.innerHTML = `
    <div class="daily-card-icon">${challengeDone ? '✅' : '⚡'}</div>
    <div class="daily-card-info">
      <h2>Daily Challenge</h2>
      <p>${challengeDone ? 'Completed! Come back tomorrow for a new set.' : '3 questions across all modules — builds your streak.'}</p>
    </div>
    <div class="daily-badge">${challengeDone ? '+50 XP earned' : '50 XP'}</div>
  `;
  if (!challengeDone) dc.addEventListener('click', startDailyChallenge);
  grid.appendChild(dc);

  // Review session card
  const missed = getMissedCount();
  if (missed > 0) {
    const rc = document.createElement('div');
    rc.className = 'module-card review-card';
    rc.innerHTML = `
      <div class="review-card-icon">📝</div>
      <div class="review-card-info">
        <h2>Review Session</h2>
        <p>You have questions to review — knock them out to lock in the knowledge.</p>
      </div>
      <div class="review-badge">${missed} to review</div>
    `;
    rc.addEventListener('click', startReviewSession);
    grid.appendChild(rc);
  }
  CURRICULUM.forEach(mod => {
    const unlocked = isModUnlocked(mod.id);
    const doneCount = mod.lessons.filter((_, i) => isDone(mod.id, i)).length;
    const total = mod.lessons.length;
    const pct = Math.round(doneCount / total * 100);
    const next = nextLesson(mod.id);

    const card = document.createElement('div');
    card.className = `module-card mod-${mod.id}${doneCount === total ? ' completed' : ''}`;
    card.innerHTML = `
      <div class="module-header">
        <div class="module-icon">${mod.icon}</div>
        <div class="module-info">
          <h2>${mod.title}</h2>
          <p>${mod.desc}</p>
        </div>
      </div>
      <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>
      <div class="module-progress-label">
        <span>${doneCount}/${total} lessons complete${(() => { const acc = moduleAccuracy(mod.id); if (acc === null) return ''; const cls = acc >= 80 ? 'good' : acc >= 60 ? 'ok' : 'low'; return `<span class="accuracy-badge ${cls}">${acc}% accuracy</span>`; })()}</span>
        <span>${pct}%</span>
      </div>
      <div class="lesson-dots">
        ${mod.lessons.map((l, i) => {
          const done = isDone(mod.id, i);
          const isCurrent = !done && i === next;
          let cls = done ? 'done' : isCurrent ? 'current' : '';
          return `<div class="lesson-dot ${cls}" title="${l.title}" onclick="startLesson(${mod.id},${i})">${done ? '✓' : i + 1}</div>`;
        }).join('')}
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('lesson-dot')) return;
      const n = nextLesson(mod.id);
      if (n >= 0) startLesson(mod.id, n);
    });
    grid.appendChild(card);
  });
}

// ─── LESSON ──────────────────────────────────────────────────────────────────
function startLesson(modId, lessonIdx) {
  session = { modId, lessonIdx, step: 0, score: 0, wrong: 0 };
  showScreen('lesson');
  renderLessonStep();
}

function renderLessonStep() {
  const mod = CURRICULUM[session.modId];
  const lesson = mod.lessons[session.lessonIdx];
  const totalSteps = 1 + lesson.quiz.length; // content + quiz questions
  const pct = session.step / totalSteps * 100;
  document.getElementById('lesson-progress-fill').style.width = pct + '%';
  updateNav();

  const body = document.getElementById('lesson-body');

  if (session.step === 0) {
    // Content
    body.innerHTML = `
      <div class="lesson-title">${mod.title} · Lesson ${session.lessonIdx + 1}</div>
      <div class="lesson-content-card">${lesson.content}</div>
      <button class="continue-btn green" onclick="advanceStep()">Start Quiz →</button>
    `;
  } else {
    // Quiz
    const qIdx = session.step - 1;
    const q = lesson.quiz[qIdx];
    body.innerHTML = `
      <div class="lesson-title">Question ${qIdx + 1} of ${lesson.quiz.length}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o, i) => `<button class="quiz-option" onclick="selectAnswer(${i})">${o}</button>`).join('')}
      </div>
      <div class="feedback-bar" id="feedback"></div>
      <button class="continue-btn blue" id="continue-quiz-btn" style="display:none" onclick="advanceStep()">Continue</button>
    `;
  }
}


function selectAnswer(idx) {
  const lesson = CURRICULUM[session.modId].lessons[session.lessonIdx];
  const qIdx = session.step - 1;
  const q = lesson.quiz[qIdx];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);
  const correct = idx === q.ans;
  opts[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) opts[q.ans].classList.add('correct');

  const fb = document.getElementById('feedback');
  fb.className = `feedback-bar show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <div class="feedback-icon">${correct ? '🎉' : '❌'}</div>
    <div class="feedback-text">
      <strong>${correct ? 'Correct!' : 'Not quite!'}</strong>
      <span>${q.exp}</span>
    </div>
  `;

  const key = lessonKey(session.modId, session.lessonIdx);
  if (correct) {
    session.score++;
    // Remove from missed pile if it was there
    if (state.missed[key]) {
      state.missed[key] = state.missed[key].filter(i => i !== qIdx);
      if (state.missed[key].length === 0) delete state.missed[key];
    }
  } else {
    session.wrong++;
    // Add to missed pile
    if (!state.missed[key]) state.missed[key] = [];
    if (!state.missed[key].includes(qIdx)) state.missed[key].push(qIdx);
  }

  document.getElementById('continue-quiz-btn').style.display = 'block';
}

function advanceStep() {
  const lesson = CURRICULUM[session.modId].lessons[session.lessonIdx];
  session.step++;
  if (session.step > lesson.quiz.length) {
    finishLesson();
  } else {
    renderLessonStep();
  }
}

function confirmBack() {
  if (confirm('Leave this lesson? Your progress in this quiz will be lost.')) {
    showScreen('home'); renderHome();
  }
}

// ─── FINISH ──────────────────────────────────────────────────────────────────
function finishLesson() {
  const lesson = CURRICULUM[session.modId].lessons[session.lessonIdx];
  const total = lesson.quiz.length;
  const score = session.score;
  const pct = Math.round(score / total * 100);
  const xpEarned = score * 20 + (pct === 100 ? 50 : 0); // bonus for perfect

  // Save
  const key = lessonKey(session.modId, session.lessonIdx);
  const prev = state.completed[key];
  if (!prev || xpEarned > prev.xpEarned) {
    state.completed[key] = { score, total, xpEarned };
    state.xp += prev ? Math.max(0, xpEarned - prev.xpEarned) : xpEarned;
  }
  save();

  // Confetti if decent score
  if (pct >= 60) launchConfetti();

  const trophy = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const msg = pct === 100 ? 'Perfect score!' : pct >= 80 ? 'Great work!' : pct >= 60 ? 'Good effort!' : 'Keep practicing!';

  showScreen('complete');
  document.getElementById('complete-body').innerHTML = `
    <div class="trophy">${trophy}</div>
    <h2>${msg}</h2>
    <p>${lesson.title} — ${score}/${total} correct</p>
    <div class="xp-earned">⭐ +${xpEarned} XP earned</div>
    <div class="stats-row">
      <div class="stat-box"><div class="val" style="color:var(--green)">${score}/${total}</div><div class="lbl">Score</div></div>
      <div class="stat-box"><div class="val" style="color:var(--yellow-dark)">${pct}%</div><div class="lbl">Accuracy</div></div>
      <div class="stat-box"><div class="val" style="color:var(--red)">${session.wrong}</div><div class="lbl">Mistakes</div></div>
    </div>
    <button class="continue-btn green" onclick="showScreen('home');renderHome()">Back to Home</button>
    ${nextLessonBtn()}
  `;
  updateNav(); updateHomeXP();
}

function nextLessonBtn() {
  const mod = CURRICULUM[session.modId];
  const nextIdx = session.lessonIdx + 1;
  if (nextIdx < mod.lessons.length) {
    return `<button class="continue-btn blue" style="margin-top:12px" onclick="startLesson(${session.modId},${nextIdx})">Next Lesson →</button>`;
  }
  const nextMod = session.modId + 1;
  if (nextMod < CURRICULUM.length) {
    return `<button class="continue-btn blue" style="margin-top:12px" onclick="showScreen('home');renderHome()">Next Module 🎓</button>`;
  }
  return `<p style="margin-top:16px;font-weight:700;color:var(--green)">🎓 You've completed all modules! Clemson is going to be a breeze.</p>`;
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#58cc02','#ffc800','#1cb0f6','#ff4b4b','#ce82ff','#ff9600'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}

// ─── REVIEW MODE ─────────────────────────────────────────────────────────────
function startReviewSession() {
  const queue = [];
  Object.entries(state.missed).forEach(([key, qIdxs]) => {
    const [modId, lessonIdx] = key.split('-').map(Number);
    qIdxs.forEach(qIdx => queue.push({ modId, lessonIdx, qIdx }));
  });
  if (queue.length === 0) return;
  // Shuffle
  queue.sort(() => Math.random() - 0.5);
  session = { modId: null, lessonIdx: null, step: 0, score: 0, wrong: 0, isReview: true, reviewQueue: queue, reviewIdx: 0 };
  showScreen('lesson');
  renderReviewQuestion();
}

function renderReviewQuestion() {
  const queue = session.reviewQueue;
  if (session.reviewIdx >= queue.length) { finishReview(); return; }
  const { modId, lessonIdx, qIdx } = queue[session.reviewIdx];
  const mod = CURRICULUM[modId];
  const lesson = mod.lessons[lessonIdx];
  const q = lesson.quiz[qIdx];
  const pct = session.reviewIdx / queue.length * 100;
  document.getElementById('lesson-progress-fill').style.width = pct + '%';
  updateNav();
  const body = document.getElementById('lesson-body');
  body.innerHTML = `
    <div class="lesson-title">📝 Review · ${lesson.title}</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((o, i) => `<button class="quiz-option" onclick="selectReviewAnswer(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback-bar" id="feedback"></div>
    <button class="continue-btn blue" id="continue-quiz-btn" style="display:none" onclick="advanceReview()">Continue</button>
  `;
}

function selectReviewAnswer(idx) {
  const { modId, lessonIdx, qIdx } = session.reviewQueue[session.reviewIdx];
  const q = CURRICULUM[modId].lessons[lessonIdx].quiz[qIdx];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);
  const correct = idx === q.ans;
  opts[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) opts[q.ans].classList.add('correct');
  const fb = document.getElementById('feedback');
  fb.className = `feedback-bar show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <div class="feedback-icon">${correct ? '🎉' : '❌'}</div>
    <div class="feedback-text">
      <strong>${correct ? 'Got it!' : 'Not quite!'}</strong>
      <span>${q.exp}</span>
    </div>
  `;
  const key = lessonKey(modId, lessonIdx);
  if (correct) {
    session.score++;
    if (state.missed[key]) {
      state.missed[key] = state.missed[key].filter(i => i !== qIdx);
      if (state.missed[key].length === 0) delete state.missed[key];
    }
  } else {
    session.wrong++;
  }
  save();
  document.getElementById('continue-quiz-btn').style.display = 'block';
}

function advanceReview() {
  session.reviewIdx++;
  renderReviewQuestion();
}

function finishReview() {
  const total = session.reviewQueue.length;
  const score = session.score;
  const pct = Math.round(score / total * 100);
  const xpEarned = score * 10;
  state.xp += xpEarned;
  save();
  if (pct >= 60) launchConfetti();
  const remaining = getMissedCount();
  showScreen('complete');
  document.getElementById('complete-body').innerHTML = `
    <div class="trophy">${pct === 100 ? '🏆' : pct >= 80 ? '🎉' : '📚'}</div>
    <h2>${pct === 100 ? 'All cleared!' : 'Review complete!'}</h2>
    <p>You reviewed ${total} question${total !== 1 ? 's' : ''} from your missed pile.</p>
    <div class="xp-earned">⭐ +${xpEarned} XP earned</div>
    <div class="stats-row">
      <div class="stat-box"><div class="val" style="color:var(--green)">${score}/${total}</div><div class="lbl">Correct</div></div>
      <div class="stat-box"><div class="val" style="color:var(--yellow-dark)">${pct}%</div><div class="lbl">Accuracy</div></div>
      <div class="stat-box"><div class="val" style="color:var(--blue)">${remaining}</div><div class="lbl">Still to Review</div></div>
    </div>
    <button class="continue-btn green" onclick="showScreen('home');renderHome()">Back to Home</button>
    ${remaining > 0 ? `<button class="continue-btn blue" style="margin-top:12px" onclick="startReviewSession()">Review Again →</button>` : ''}
  `;
  updateNav(); updateHomeXP();
}

// ─── DAILY CHALLENGE ─────────────────────────────────────────────────────────
let dailySession = { questions: [], idx: 0, score: 0 };

function startDailyChallenge() {
  // Collect all questions from all modules, tagged with source
  const pool = [];
  CURRICULUM.forEach(mod => {
    mod.lessons.forEach((lesson, lIdx) => {
      lesson.quiz.forEach((q, qIdx) => {
        pool.push({ mod, lesson, q, lIdx, qIdx });
      });
    });
  });
  // Pick 3 random unique questions
  const shuffled = pool.sort(() => Math.random() - 0.5);
  dailySession = { questions: shuffled.slice(0, 3), idx: 0, score: 0 };
  showScreen('daily');
  renderDailyQuestion();
}

function renderDailyQuestion() {
  const { questions, idx } = dailySession;
  const { mod, lesson, q } = questions[idx];
  const pct = (idx / 3) * 100;
  document.getElementById('daily-progress-fill').style.width = pct + '%';
  document.getElementById('daily-q-counter').textContent = `${idx + 1} / 3`;
  document.getElementById('daily-body').innerHTML = `
    <div class="lesson-title">⚡ Daily Challenge · ${mod.title}</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((o, i) => `<button class="quiz-option" onclick="selectDailyAnswer(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback-bar" id="daily-feedback"></div>
    <button class="continue-btn blue" id="daily-continue-btn" style="display:none" onclick="advanceDaily()">Continue</button>
  `;
}

function selectDailyAnswer(idx) {
  const { q } = dailySession.questions[dailySession.idx];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);
  const correct = idx === q.ans;
  opts[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) opts[q.ans].classList.add('correct');
  const fb = document.getElementById('daily-feedback');
  fb.className = `feedback-bar show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <div class="feedback-icon">${correct ? '🎉' : '❌'}</div>
    <div class="feedback-text">
      <strong>${correct ? 'Correct!' : 'Not quite!'}</strong>
      <span>${q.exp}</span>
    </div>
  `;
  if (correct) dailySession.score++;
  document.getElementById('daily-continue-btn').style.display = 'block';
}

function advanceDaily() {
  dailySession.idx++;
  if (dailySession.idx >= 3) {
    finishDailyChallenge();
  } else {
    renderDailyQuestion();
  }
}

function finishDailyChallenge() {
  const score = dailySession.score;
  const xpEarned = 50;
  state.xp += xpEarned;
  state.dailyChallengeDate = new Date().toDateString();
  save();
  launchConfetti();
  const msgs = ['One and done — come back tomorrow!', "You're building a habit. Keep it up.", 'Consistency beats intensity every time.'];
  showScreen('complete');
  document.getElementById('complete-body').innerHTML = `
    <div class="trophy">⚡</div>
    <h2>Daily Challenge Complete!</h2>
    <p>${msgs[Math.floor(Math.random() * msgs.length)]}</p>
    <div class="xp-earned">⭐ +${xpEarned} XP earned</div>
    <div class="stats-row">
      <div class="stat-box"><div class="val" style="color:var(--green)">${score}/3</div><div class="lbl">Correct</div></div>
      <div class="stat-box"><div class="val" style="color:var(--yellow-dark)">${Math.round(score/3*100)}%</div><div class="lbl">Accuracy</div></div>
      <div class="stat-box"><div class="val" style="color:var(--blue)">🔥${state.streak}</div><div class="lbl">Streak</div></div>
    </div>
    <button class="continue-btn green" onclick="showScreen('home');renderHome()">Back to Home</button>
  `;
  updateNav(); updateHomeXP();
}

function filterGlossary(query) {
  const q = query.toLowerCase().trim();
  const body = document.getElementById('glossary-body');
  const countEl = document.getElementById('glossary-count');
  let totalShown = 0;
  let html = '';

  GLOSSARY.forEach(cat => {
    const matches = cat.terms.filter(t =>
      !q || t.word.toLowerCase().includes(q) || t.def.toLowerCase().includes(q)
    );
    if (matches.length === 0) return;
    totalShown += matches.length;
    html += `<div class="glossary-category">
      <div class="glossary-cat-title">${cat.category}</div>
      <div class="glossary-grid">
        ${matches.map(t => `
          <div class="glossary-term${q && (t.word.toLowerCase().includes(q) || t.def.toLowerCase().includes(q)) ? ' highlight' : ''}">
            <div class="glossary-term-word">${highlight(t.word, q)}</div>
            <div class="glossary-term-def">${highlight(t.def, q)}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  if (totalShown === 0) {
    body.innerHTML = `<div class="glossary-empty"><div style="font-size:48px">🔍</div><p>No terms match "<strong>${query}</strong>"</p></div>`;
  } else {
    body.innerHTML = html;
  }
  const total = GLOSSARY.reduce((s, c) => s + c.terms.length, 0);
  countEl.textContent = q ? `${totalShown} of ${total} terms match` : `${total} terms across ${GLOSSARY.length} categories`;
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:var(--yellow-light);border-radius:3px;padding:0 2px">$1</mark>');
}
